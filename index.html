<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>HIMYM — The Gang</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0a0a0f; color: #f0f0f0; height: 100dvh; display: flex; flex-direction: column; overflow: hidden; }

    #top-nav { display: none; background: #0a0a0f; border-bottom: 1px solid #1e1e2e; padding: 10px 12px; gap: 8px; overflow-x: auto; flex-shrink: 0; scrollbar-width: none; }
    #top-nav::-webkit-scrollbar { display: none; }

    .nav-btn { display: flex; flex-direction: column; align-items: center; gap: 4px; padding: 6px 10px; border-radius: 12px; border: none; background: transparent; cursor: pointer; flex-shrink: 0; min-width: 60px; }
    .nav-btn.active { background: #1a1a28; }
    .nav-avatar-wrap { position: relative; }
    .nav-avatar { width: 40px; height: 40px; border-radius: 50%; overflow: hidden; border: 2px solid transparent; }
    .nav-btn.active .nav-avatar { border-color: var(--char-color); }
    .nav-avatar svg { width: 100%; height: 100%; }
    .nav-name { font-size: 10px; color: #666; white-space: nowrap; }
    .nav-btn.active .nav-name { color: #e0e0e0; }

    #layout { display: flex; flex: 1; min-height: 0; }

    #sidebar { width: 220px; flex-shrink: 0; background: #0a0a0f; border-right: 1px solid #1e1e2e; display: flex; flex-direction: column; padding: 16px 0; overflow-y: auto; }
    #sidebar h2 { font-size: 11px; font-weight: 600; color: #333; text-transform: uppercase; letter-spacing: 1px; padding: 0 16px 12px; }

    .char-btn { display: flex; align-items: center; gap: 12px; padding: 10px 16px; cursor: pointer; border: none; background: transparent; width: 100%; text-align: left; transition: background 0.15s; border-left: 3px solid transparent; }
    .char-btn:hover { background: #111120; }
    .char-btn.active { background: #111120; border-left-color: var(--char-color); }
    .char-avatar-wrap { width: 40px; height: 40px; border-radius: 50%; overflow: hidden; flex-shrink: 0; }
    .char-avatar-wrap svg { width: 100%; height: 100%; }
    .char-info { flex: 1; min-width: 0; }
    .char-name { font-size: 13px; font-weight: 500; color: #e0e0e0; }
    .char-role { font-size: 11px; color: #444; margin-top: 1px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

    #main { flex: 1; display: flex; flex-direction: column; min-width: 0; min-height: 0; position: relative; }

    #bg-canvas { position: absolute; inset: 0; z-index: 0; opacity: 0.07; transition: opacity 0.4s; pointer-events: none; overflow: hidden; }
    #bg-canvas svg { width: 100%; height: 100%; }

    #chat-header { display: flex; align-items: center; gap: 12px; padding: 12px 16px; border-bottom: 1px solid #1e1e2e; background: rgba(10,10,15,0.9); flex-shrink: 0; position: relative; z-index: 1; backdrop-filter: blur(8px); }
    #header-avatar { width: 38px; height: 38px; border-radius: 50%; overflow: hidden; flex-shrink: 0; }
    #header-avatar svg { width: 100%; height: 100%; }
    #header-name { font-size: 14px; font-weight: 500; color: #f0f0f0; }
    #header-status { font-size: 11px; color: #444; margin-top: 1px; }
    .online-dot { width: 8px; height: 8px; border-radius: 50%; background: #3B6D11; margin-left: auto; flex-shrink: 0; }

    #chat-window { flex: 1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 12px; min-height: 0; position: relative; z-index: 1; }
    #chat-window::-webkit-scrollbar { width: 4px; }
    #chat-window::-webkit-scrollbar-thumb { background: #2a2a3a; border-radius: 4px; }

    .msg-row { display: flex; gap: 8px; align-items: flex-start; }
    .msg-row.user { flex-direction: row-reverse; }
    .msg-avatar { width: 28px; height: 28px; border-radius: 50%; overflow: hidden; flex-shrink: 0; }
    .msg-avatar svg { width: 100%; height: 100%; }
    .bubble { padding: 10px 13px; font-size: 14px; line-height: 1.6; max-width: 78%; border-radius: 4px 14px 14px 14px; background: rgba(30,30,46,0.95); color: #e0e0e0; word-break: break-word; }
    .bubble.user { background: #185FA5; border-radius: 14px 4px 14px 14px; color: #fff; }
    .char-label { font-size: 11px; color: #333; margin-bottom: 2px; padding-left: 36px; }

    #typing { display: none; align-items: center; gap: 8px; padding: 0 16px 8px; position: relative; z-index: 1; }
    .dot { width: 6px; height: 6px; border-radius: 50%; background: #555; display: inline-block; animation: bounce 1.2s infinite; }
    .dot:nth-child(2) { animation-delay: 0.2s; }
    .dot:nth-child(3) { animation-delay: 0.4s; }
    @keyframes bounce { 0%,60%,100%{transform:translateY(0)} 30%{transform:translateY(-5px)} }

    #input-area { padding: 10px 12px 12px; border-top: 1px solid #1e1e2e; display: flex; gap: 8px; align-items: flex-end; flex-shrink: 0; position: relative; z-index: 1; background: rgba(10,10,15,0.9); }
    #user-input { flex: 1; resize: none; font-size: 14px; padding: 10px 12px; border-radius: 20px; border: 1px solid #2a2a3a; background: #0f0f18; color: #f0f0f0; font-family: inherit; line-height: 1.5; outline: none; max-height: 120px; }
    #user-input:focus { border-color: #2a2a4a; }
    #user-input::placeholder { color: #333; }
    #send-btn { width: 44px; height: 44px; border-radius: 50%; font-size: 18px; cursor: pointer; border: none; color: #fff; flex-shrink: 0; display: flex; align-items: center; justify-content: center; transition: opacity 0.15s; }
    #send-btn:disabled { opacity: 0.4; cursor: not-allowed; }

    @media (max-width: 600px) {
      #sidebar { display: none; }
      #top-nav { display: flex; }
      .bubble { max-width: 88%; font-size: 13px; }
    }
  </style>
</head>
<body>

<div id="top-nav"></div>

<div id="layout">
  <div id="sidebar">
    <h2>The Gang</h2>
    <div id="sidebar-chars"></div>
  </div>

  <div id="main">
    <div id="bg-canvas"></div>

    <div id="chat-header">
      <div id="header-avatar"></div>
      <div>
        <div id="header-name">Barney Stinson</div>
        <div id="header-status">Suits. Schemes. Legendary.</div>
      </div>
      <div class="online-dot"></div>
    </div>

    <div id="chat-window"></div>

    <div id="typing">
      <div class="msg-avatar" id="typing-avatar"></div>
      <div style="background:rgba(30,30,46,0.95);padding:10px 14px;border-radius:4px 14px 14px 14px;">
        <span class="dot"></span><span class="dot"></span><span class="dot"></span>
      </div>
    </div>

    <div id="input-area">
      <textarea id="user-input" rows="1" placeholder="Message Barney..."></textarea>
      <button id="send-btn" onclick="sendMessage()" style="background:#185FA5">↑</button>
    </div>
  </div>

function buildUI() {
  const topNav = document.getElementById('top-nav');
  const sidebarChars = document.getElementById('sidebar-chars');

  Object.entries(CHARS).forEach(([key, info]) => {
    const navBtn = document.createElement('button');
    navBtn.className = 'nav-btn' + (key === 'barney' ? ' active' : '');
    navBtn.style.setProperty('--char-color', info.color);
    navBtn.onclick = () => switchChar(key);
    navBtn.innerHTML = `<div class="nav-avatar-wrap"><div class="nav-avatar">${AVATARS[key]}</div></div><span class="nav-name">${info.name.split(' ')[0]}</span>`;
    topNav.appendChild(navBtn);

    const sideBtn = document.createElement('button');
    sideBtn.className = 'char-btn' + (key === 'barney' ? ' active' : '');
    sideBtn.style.setProperty('--char-color', info.color);
    sideBtn.onclick = () => switchChar(key);
    sideBtn.innerHTML = `<div class="char-avatar-wrap">${AVATARS[key]}</div><div class="char-info"><div class="char-name">${info.name.split(' ')[0]}</div><div class="char-role">${info.role || info.status.split('.')[0]}</div></div>`;
    sidebarChars.appendChild(sideBtn);
  });

  document.getElementById('header-avatar').innerHTML = AVATARS.barney;
  document.getElementById('typing-avatar').innerHTML = AVATARS.barney;
  document.getElementById('bg-canvas').innerHTML = BACKGROUNDS.barney;
  addGreeting('barney');
}

function switchChar(char) {
  if (char === currentChar) return;
  currentChar = char;
  const info = CHARS[char];

  document.querySelectorAll('.char-btn').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  document.querySelectorAll(`.char-btn`)[Object.keys(CHARS).indexOf(char)].classList.add('active');
  document.querySelectorAll(`.nav-btn`)[Object.keys(CHARS).indexOf(char)].classList.add('active');

  document.getElementById('header-avatar').innerHTML = AVATARS[char];
  document.getElementById('header-name').textContent = info.name;
  document.getElementById('header-status').textContent = info.status;
  document.getElementById('send-btn').style.background = info.color;
  document.getElementById('user-input').placeholder = info.placeholder;
  document.getElementById('typing-avatar').innerHTML = AVATARS[char];
  document.getElementById('bg-canvas').innerHTML = BACKGROUNDS[char];

  const win = document.getElementById('chat-window');
  win.innerHTML = '';
  addGreeting(char);
  if (initialized[char]) restoreHistory(char);
  initialized[char] = true;
  document.getElementById('user-input').focus();
}

function addGreeting(char) {
  const win = document.getElementById('chat-window');
  const label = document.createElement('div');
  label.className = 'char-label';
  label.textContent = CHARS[char].name.split(' ')[0];
  win.appendChild(label);
  const row = document.createElement('div');
  row.className = 'msg-row';
  row.innerHTML = `<div class="msg-avatar">${AVATARS[char]}</div><div class="bubble">${GREETINGS[char]}</div>`;
  win.appendChild(row);
}

function restoreHistory(char) {
  histories[char].forEach(msg => {
    if (msg.role === 'user') appendBubble('user', msg.content, char);
    else appendBubble('char', msg.content, char);
  });
}

async function sendMessage() {
  const input = document.getElementById('user-input');
  const btn = document.getElementById('send-btn');
  const msg = input.value.trim();
  if (!msg) return;
  input.value = '';
  input.style.height = 'auto';
  btn.disabled = true;

  appendBubble('user', msg, currentChar);
  histories[currentChar].push({ role: 'user', content: msg });
  setTyping(true);

  try {
    const res = await fetch(BACKEND + '/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ messages: histories[currentChar], character: currentChar })
    });
    const data = await res.json();
    const reply = data.reply || "Something went wrong. Try again.";
    histories[currentChar].push({ role: 'assistant', content: reply });
    setTyping(false);
    appendBubble('char', reply, currentChar);
  } catch(e) {
    setTyping(false);
    appendBubble('char', "Server might be waking up — wait 30 seconds and try again.", currentChar);
  }
  btn.disabled = false;
}

function appendBubble(side, text, char) {
  const win = document.getElementById('chat-window');
  const row = document.createElement('div');
  if (side === 'user') {
    row.className = 'msg-row user';
    row.innerHTML = `<div class="bubble user">${text}</div>`;
  } else {
    const label = document.createElement('div');
    label.className = 'char-label';
    label.textContent = CHARS[char].name.split(' ')[0];
    win.appendChild(label);
    row.className = 'msg-row';
    row.innerHTML = `<div class="msg-avatar">${AVATARS[char]}</div><div class="bubble">${text}</div>`;
  }
  win.appendChild(row);
  win.scrollTop = win.scrollHeight;
}

function setTyping(show) {
  document.getElementById('typing').style.display = show ? 'flex' : 'none';
  if (show) document.getElementById('chat-window').scrollTop = 99999;
}

document.getElementById('user-input').addEventListener('input', function() {
  this.style.height = 'auto';
  this.style.height = Math.min(this.scrollHeight, 120) + 'px';
});

document.getElementById('user-input').addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
});

buildUI();
</script>
</body>
</html>
